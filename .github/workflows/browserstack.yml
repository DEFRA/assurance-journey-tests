name: BrowserStack Tests

on:
  push:
    branches: [ main ]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repo
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 18

      - name: Install dependencies
        run: npm ci

      # ✅ Inject BrowserStack credentials
      - name: Setup BrowserStack Env
        uses: browserstack/github-actions/setup-env@master
        with:
          username: ${{ secrets.BROWSERSTACK_USERNAME }}
          access-key: ${{ secrets.BROWSERSTACK_ACCESS_KEY }}

      # ✅ Start BrowserStack local tunnel (CRITICAL if app is not public)
      - name: Start BrowserStack Local
        uses: browserstack/github-actions/setup-local@master
        with:
          local-testing: start

      # ✅ Run tests USING CORRECT CONFIG
      - name: Run BrowserStack Tests
        run: npm run test:browserstack
        env:
          BASE_URL: http://localhost:3000

      # ✅ Stop tunnel
      - name: Stop BrowserStack Local
        uses: browserstack/github-actions/setup-local@master
        with:
          local-testing: stop
